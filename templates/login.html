<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SHARIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#22d3ee'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-slate-800">
    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-accent/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-blue-500/5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Header -->
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">Welcome back</h1>
                <p class="text-slate-400">Sign in to your SHARIT account to manage expenses with your groups</p>
            </header>

            <!-- Login Form Card -->
            <div class="backdrop-blur-lg bg-white/5 border border-white/10 rounded-2xl shadow-2xl p-8">
                <form method="POST" action="/api/authenticate" class="space-y-6" id="login-form">
                    <!-- CSRF Token -->
                    <input type="hidden" name="csrf_token" value="secure_csrf_token_placeholder">

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-200 mb-2">
                            Email address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            aria-describedby="email-error"
                            class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-accent focus:border-accent transition-all duration-200 hover:border-slate-500"
                            placeholder="Enter your email address"
                        >
                        <div id="email-error" class="mt-1 text-sm text-red-400 hidden" role="alert"></div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-200 mb-2">
                            Password
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            aria-describedby="password-error"
                            class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-accent focus:border-accent transition-all duration-200 hover:border-slate-500"
                            placeholder="Enter your password"
                        >
                        <div id="password-error" class="mt-1 text-sm text-red-400 hidden" role="alert"></div>
                    </div>

                    <!-- Remember Me Checkbox -->
                    <div class="flex items-center">
                        <input 
                            type="checkbox" 
                            id="remember-me" 
                            name="remember_me" 
                            value="true"
                            class="w-4 h-4 text-accent bg-slate-800/50 border-slate-600 rounded focus:ring-accent focus:ring-2"
                        >
                        <label for="remember-me" class="ml-2 text-sm text-slate-300">
                            Keep me signed in for 30 days
                        </label>
                    </div>

                    <!-- Form Error State -->
                    <div id="form-error" class="hidden p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-red-400 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                            </svg>
                            <span class="text-sm text-red-300" id="form-error-message">Invalid email or password. Please try again.</span>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="login-button"
                        class="w-full bg-accent hover:bg-cyan-400 text-slate-900 font-semibold py-3 px-4 rounded-xl transition-all duration-200 hover:-translate-y-0.5 focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                    >
                        <span id="login-button-text">Sign in to SHARIT</span>
                        <span id="login-button-loading" class="hidden">
                            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 inline" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Signing in...
                        </span>
                    </button>

                    <!-- Forgot Password Link -->
                    <div class="text-center">
                        <a 
                            href="/password-reset" 
                            class="text-sm text-accent hover:text-cyan-300 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-slate-900 rounded px-1"
                        >
                            Forgot your password?
                        </a>
                    </div>
                </form>
            </div>

            <!-- Create Account Section -->
            <div class="mt-8 text-center">
                <div class="backdrop-blur-lg bg-white/5 border border-white/10 rounded-xl p-6">
                    <p class="text-slate-400 text-sm mb-3">Don't have an account yet?</p>
                    <a 
                        href="/register" 
                        class="inline-flex items-center justify-center w-full px-4 py-2 border border-slate-600 text-slate-200 rounded-xl hover:bg-white/5 hover:border-slate-500 transition-all duration-200 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:ring-offset-slate-900"
                    >
                        Create your SHARIT account
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Form submission handling with loading states
        document.getElementById('login-form').addEventListener('submit', function(e) {
            const button = document.getElementById('login-button');
            const buttonText = document.getElementById('login-button-text');
            const buttonLoading = document.getElementById('login-button-loading');
            const formError = document.getElementById('form-error');
            
            // Hide any previous errors
            formError.classList.add('hidden');
            
            // Show loading state
            button.disabled = true;
            buttonText.classList.add('hidden');
            buttonLoading.classList.remove('hidden');
            
            // Basic client-side validation
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                e.preventDefault();
                showFormError('Please fill in all required fields.');
                resetButton();
                return;
            }
            
            if (!isValidEmail(email)) {
                e.preventDefault();
                showFormError('Please enter a valid email address.');
                resetButton();
                return;
            }
            
            // Form will submit naturally to backend
        });
        
        function showFormError(message) {
            const formError = document.getElementById('form-error');
            const errorMessage = document.getElementById('form-error-message');
            errorMessage.textContent = message;
            formError.classList.remove('hidden');
        }
        
        function resetButton() {
            const button = document.getElementById('login-button');
            const buttonText = document.getElementById('login-button-text');
            const buttonLoading = document.getElementById('login-button-loading');
            
            button.disabled = false;
            buttonText.classList.remove('hidden');
            buttonLoading.classList.add('hidden');
        }
        
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        // Real-time validation feedback
        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value;
            const errorDiv = document.getElementById('email-error');
            
            if (email && !isValidEmail(email)) {
                errorDiv.textContent = 'Please enter a valid email address.';
                errorDiv.classList.remove('hidden');
                this.classList.add('border-red-500');
            } else {
                errorDiv.classList.add('hidden');
                this.classList.remove('border-red-500');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - SHARIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#22d3ee'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-slate-800 text-slate-100 flex items-center justify-center p-4">
    <main class="w-full max-w-lg">
        <section class="rounded-3xl border border-slate-700/60 bg-slate-800/60 backdrop-blur-sm shadow-2xl p-8 md:p-10 text-center">
            <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-accent/15 flex items-center justify-center">
                <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1 class="text-3xl md:text-4xl font-bold mb-4">Your password is changed</h1>
            <p class="text-slate-300 text-lg mb-8">
                Your SHARIT password has been updated successfully. You can now log in with your new password.
            </p>

            <a
                href="/login"
                class="inline-flex items-center justify-center w-full sm:w-auto px-8 py-3 rounded-xl bg-accent hover:bg-cyan-400 text-slate-900 font-semibold transition-all duration-200 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-slate-800"
            >
                Go To Login
            </a>
        </section>
    </main>
</body>
</html>
